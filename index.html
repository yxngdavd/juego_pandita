<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🐼 Panda Bambú</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
    body {
      background: #0d1f0d;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #gameWrapper {
      background: #1a3a1a; border-radius: 12px;
      overflow: hidden; border: 2px solid #2d5a2d;
      width: 100%; max-width: 640px;
    }
    #hud {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; background: #0d1f0d;
      color: #7dff7d; font-size: 13px; font-weight: bold;
      border-bottom: 2px solid #2d5a2d;
    }
    #gameArea { position: relative; width: 100%; }
    #gameCanvas { display: block; width: 100%; height: auto; image-rendering: pixelated; }
    #overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.80);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: white;
    }
    #overlay h2 { font-size: 26px; color: #7dff7d; margin-bottom: 8px; }
    #overlay p  { font-size: 13px; color: #ccc; margin-bottom: 18px; text-align: center; line-height: 1.6; }
    .btn-play {
      background: #2d7a2d; color: white;
      border: 2px solid #7dff7d; padding: 10px 30px;
      font-size: 16px; font-family: 'Courier New', monospace;
      cursor: pointer; border-radius: 8px; transition: background 0.15s;
    }
    .btn-play:hover, .btn-play:active { background: #3d9a3d; }
    #controls {
      display: none; background: #0d1f0d;
      padding: 10px 16px; border-top: 2px solid #2d5a2d;
    }
    #controls.visible { display: flex; justify-content: space-between; align-items: center; }
    .dpad { display: grid; grid-template-columns: 44px 44px; gap: 6px; }
    .ctrl-btn {
      background: #1e4d1e; border: 2px solid #4CAF50;
      border-radius: 8px; color: #7dff7d; font-size: 20px;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      user-select: none; transition: background 0.1s;
    }
    .ctrl-btn:active, .ctrl-btn.pressed { background: #3d9a3d; }
    .jump-btn {
      background: #1e3a6e; border: 2px solid #42A5F5;
      color: #90CAF9; width: 60px; height: 60px;
      border-radius: 50%; font-size: 26px;
    }
    .jump-btn:active, .jump-btn.pressed { background: #1565C0; }
    #msg {
      text-align: center; padding: 5px;
      background: #0d1f0d; color: #4CAF50;
      font-size: 11px; border-top: 2px solid #2d5a2d;
    }
    #levelBadge {
      font-size: 12px; font-weight: bold;
      padding: 2px 8px; border-radius: 4px;
      background: #2d5a2d; color: #7dff7d;
    }
    @media (max-width: 640px) {
      #gameWrapper { border-radius: 0; border-left: none; border-right: none; }
      body { justify-content: flex-start; }
      #msg { display: none; }
    }
  </style>
</head>
<body>
<div id="gameWrapper">
  <div id="hud">
    <span>🐼 PANDA BAMBÚ</span>
    <span id="levelBadge">NIVEL 1</span>
    <span id="score">🎋 0</span>
    <span id="lives">❤️ 3</span>
    <span id="timer">⏱ 60</span>
  </div>
  <div id="gameArea">
    <canvas id="gameCanvas" width="640" height="320"></canvas>
    <div id="overlay">
      <h2>🐼 PANDA BAMBÚ</h2>
      <p>¡Recoge todo el bambú!<br>← → Mover &nbsp;|&nbsp; ↑ / Z Saltar<br><br>📱 Móvil: usa los botones de abajo</p>
      <button class="btn-play" id="startBtn">JUGAR</button>
    </div>
  </div>
  <div id="controls">
    <div class="dpad">
      <div class="ctrl-btn" id="btnLeft">◀</div>
      <div class="ctrl-btn" id="btnRight">▶</div>
    </div>
    <div class="ctrl-btn jump-btn" id="btnJump">↑</div>
  </div>
  <div id="msg">← → Mover &nbsp;|&nbsp; ↑ / Z Saltar &nbsp;|&nbsp; Pisa enemigos desde arriba</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const timerEl = document.getElementById('timer');
const levelBadgeEl = document.getElementById('levelBadge');
const controlsDiv = document.getElementById('controls');

const W = 640, H = 320;
const TILE = 32;
const GRAVITY = 0.5;
const JUMP = -11;
const SPEED = 3.5;

let state = 'idle';
let keys = {};
let touch = { left: false, right: false, jump: false };
let score, lives, timeLeft, timerInterval, animFrame;
let camera = { x: 0 };
let invincible = 0;
let currentLevel = 1;
let checkpoint = 1; // nivel guardado al llegar a él
let level, player;
let seeds = []; // projectiles from shooter enemy
let particles = [];

function isMobile() {
  return /Android|iPhone|iPad|iPod|Touch/i.test(navigator.userAgent) || window.innerWidth < 640;
}

// ─── LEVEL 1 ───────────────────────────────────────────
const MAP_W1 = 30;
function buildLevel1() {
  const platforms = [];
  const bamboos = [];
  const enemies = [];

  for (let x = 0; x < MAP_W1; x++)
    platforms.push({ x: x * TILE, y: 9 * TILE, w: TILE, h: TILE * 2, type: 'ground' });

  const plats = [
    [3,6,3],[7,5,2],[11,6,3],[15,4,2],
    [19,6,2],[23,5,3],[26,6,2]
  ];
  plats.forEach(([col,row,len]) => {
    for (let i = 0; i < len; i++)
      platforms.push({ x:(col+i)*TILE, y:row*TILE, w:TILE, h:TILE/2, type:'platform' });
  });

  const bpos = [
    [3,8],[4,8],[5,8],[7,4],[8,4],[11,8],[12,8],[13,8],
    [3,5],[7,5],[15,3],[16,3],[19,8],[20,8],[23,4],[24,4],[25,4],
    [26,8],[27,8],[28,8],[29,8],[9,8],[10,8],[17,8],[18,8]
  ];
  bpos.forEach(([col,row]) => {
    bamboos.push({ x:col*TILE+8, y:row*TILE-24, w:16, h:24, collected:false });
  });

  const edef = [
    { x:6*TILE,  minX:5*TILE,  maxX:8*TILE,  dir:1  },
    { x:13*TILE, minX:11*TILE, maxX:14*TILE, dir:-1 },
    { x:20*TILE, minX:19*TILE, maxX:22*TILE, dir:1  },
    { x:26*TILE, minX:25*TILE, maxX:29*TILE, dir:-1 },
  ];
  edef.forEach(e => {
    enemies.push({ x:e.x, y:8*TILE-24, w:24, h:24,
                   dir:e.dir, minX:e.minX, maxX:e.maxX, speed:1.2, alive:true, type:'walker' });
  });

  return { platforms, bamboos, enemies, mapW: MAP_W1, timeLimit: 60 };
}

// ─── LEVEL 2 ───────────────────────────────────────────
const MAP_W2 = 38;
function buildLevel2() {
  const platforms = [];
  const bamboos = [];
  const enemies = [];

  // Ground
  for (let x = 0; x < MAP_W2; x++)
    platforms.push({ x:x*TILE, y:9*TILE, w:TILE, h:TILE*2, type:'ground' });

  // More complex platform layout — gaps, higher platforms, longer jumps
  const plats = [
    [2,7,2],[5,6,2],[8,5,2],[11,7,2],[13,5,3],[17,6,2],
    [20,4,2],[22,6,3],[25,5,2],[28,7,2],[30,5,3],[33,6,2],[35,4,2]
  ];
  plats.forEach(([col,row,len]) => {
    for (let i = 0; i < len; i++)
      platforms.push({ x:(col+i)*TILE, y:row*TILE, w:TILE, h:TILE/2, type:'platform' });
  });

  // More bamboos — 38 total
  const bpos = [
    [2,9],[3,9],[5,9],[6,9],[8,5],[9,5],[11,9],[12,9],
    [13,4],[14,4],[15,4],[17,9],[18,9],[20,3],[21,3],
    [22,5],[23,5],[24,5],[25,9],[26,9],[27,9],
    [28,9],[30,4],[31,4],[32,4],[33,9],[34,9],
    [35,3],[36,3],[37,9],[4,6],[7,4],[16,5],[19,9],[29,6],[10,8],[1,8],[0,8]
  ];
  bpos.forEach(([col,row]) => {
    bamboos.push({ x:col*TILE+8, y:row*TILE-24, w:16, h:24, collected:false });
  });

  // Walkers
  const walkerDef = [
    { x:3*TILE,  minX:2*TILE,  maxX:5*TILE,  dir:1, speed:1.5 },
    { x:12*TILE, minX:11*TILE, maxX:13*TILE, dir:-1, speed:1.8 },
    { x:18*TILE, minX:17*TILE, maxX:20*TILE, dir:1, speed:1.6 },
    { x:26*TILE, minX:25*TILE, maxX:28*TILE, dir:-1, speed:2.0 },
    { x:34*TILE, minX:33*TILE, maxX:37*TILE, dir:1, speed:1.8 },
  ];
  walkerDef.forEach(e => {
    enemies.push({ x:e.x, y:8*TILE-24, w:24, h:24,
                   dir:e.dir, minX:e.minX, maxX:e.maxX, speed:e.speed, alive:true, type:'walker' });
  });

  // Shooters — plant/seed villains, stationary but fire seeds horizontally
  const shooterDef = [
    { x:9*TILE,  y:8*TILE-28, shootDir:-1, range:180, cooldown:0 },
    { x:22*TILE, y:8*TILE-28, shootDir:-1, range:200, cooldown:60 },
    { x:30*TILE, y:8*TILE-28, shootDir:1,  range:200, cooldown:30 },
  ];
  shooterDef.forEach(s => {
    enemies.push({ x:s.x, y:s.y, w:26, h:28,
                   dir:s.shootDir, alive:true, type:'shooter',
                   range:s.range, cooldown:s.cooldown, maxCooldown:100, shootTimer:0 });
  });

  return { platforms, bamboos, enemies, mapW: MAP_W2, timeLimit: 90 };
}

// ─── LEVEL 3 ───────────────────────────────────────────
const MAP_W3 = 44;
function buildLevel3() {
  const platforms = [];
  const bamboos = [];
  const enemies = [];

  // Ground with gaps! Danger zones
  for (let x = 0; x < MAP_W3; x++) {
    // Gaps at specific positions
    if ([5,6,14,15,22,23,31,32,38,39].includes(x)) continue;
    platforms.push({ x:x*TILE, y:9*TILE, w:TILE, h:TILE*2, type:'ground' });
  }

  // Elevated platforms — tight jumps required
  const plats = [
    [2,7,2],[4,5,2],[7,6,2],[9,4,2],[12,6,2],[14,4,3],
    [18,5,2],[20,7,2],[22,4,3],[26,6,2],[28,4,2],[30,6,2],
    [32,4,3],[36,5,2],[38,7,2],[40,5,2],[42,6,2]
  ];
  plats.forEach(([col,row,len]) => {
    for (let i = 0; i < len; i++)
      platforms.push({ x:(col+i)*TILE, y:row*TILE, w:TILE, h:TILE/2, type:'platform' });
  });

  // Bamboos — 45 total
  const bpos = [
    [0,9],[1,9],[2,9],[2,6],[3,6],[4,4],[5,4],[7,9],[8,9],[9,3],[10,3],[12,9],[13,9],
    [14,3],[15,3],[16,3],[18,4],[19,4],[20,9],[21,9],[22,3],[23,3],[24,3],
    [26,9],[27,9],[28,3],[29,3],[30,9],[32,3],[33,3],[34,3],
    [36,4],[37,4],[40,4],[41,4],[42,9],[43,9],
    [7,5],[17,8],[25,5],[35,7],[11,5],[3,8],[39,4]
  ];
  bpos.forEach(([col,row]) => {
    bamboos.push({ x:col*TILE+8, y:row*TILE-24, w:16, h:24, collected:false });
  });

  // Fast walkers
  const walkerDef = [
    { x:1*TILE,  minX:0,       maxX:4*TILE,  dir:1,  speed:2.5 },
    { x:8*TILE,  minX:7*TILE,  maxX:11*TILE, dir:-1, speed:2.8 },
    { x:16*TILE, minX:12*TILE, maxX:16*TILE, dir:1,  speed:3.0 },
    { x:24*TILE, minX:20*TILE, maxX:25*TILE, dir:-1, speed:2.6 },
    { x:33*TILE, minX:30*TILE, maxX:35*TILE, dir:1,  speed:3.2 },
    { x:40*TILE, minX:38*TILE, maxX:43*TILE, dir:-1, speed:3.0 },
  ];
  walkerDef.forEach(e => {
    enemies.push({ x:e.x, y:8*TILE-24, w:24, h:24,
                   dir:e.dir, minX:e.minX, maxX:e.maxX, speed:e.speed, alive:true, type:'walker' });
  });

  // Shooters (ground)
  const shooterDef = [
    { x:10*TILE, y:8*TILE-28, shootDir:-1, range:180, cooldown:20 },
    { x:27*TILE, y:8*TILE-28, shootDir:1,  range:200, cooldown:50 },
    { x:41*TILE, y:8*TILE-28, shootDir:-1, range:200, cooldown:10 },
  ];
  shooterDef.forEach(s => {
    enemies.push({ x:s.x, y:s.y, w:26, h:28,
                   dir:s.shootDir, alive:true, type:'shooter',
                   range:s.range, cooldown:s.cooldown, maxCooldown:80, shootTimer:s.cooldown });
  });

  // Aerial enemies — dragons that patrol the sky and drop fireballs
  const aerialDef = [
    { x:5*TILE,  y:2*TILE, minX:1*TILE,  maxX:13*TILE, dir:1,  speed:1.8, dropCooldown:0,  maxDrop:140 },
    { x:20*TILE, y:3*TILE, minX:16*TILE, maxX:28*TILE, dir:-1, speed:2.2, dropCooldown:60, maxDrop:120 },
    { x:35*TILE, y:2*TILE, minX:28*TILE, maxX:43*TILE, dir:1,  speed:2.5, dropCooldown:30, maxDrop:100 },
  ];
  aerialDef.forEach(a => {
    enemies.push({
      x: a.x, y: a.y, w: 36, h: 26,
      dir: a.dir, minX: a.minX, maxX: a.maxX, speed: a.speed,
      alive: true, type: 'aerial',
      dropTimer: a.dropCooldown, maxDrop: a.maxDrop,
      wingFrame: 0, wingTimer: 0
    });
  });

  return { platforms, bamboos, enemies, mapW: MAP_W3, timeLimit: 100 };
}

// ─── Init ──────────────────────────────────────────────
function initGame(lvl) {
  currentLevel = lvl;
  if (lvl > checkpoint) checkpoint = lvl; // guardar progreso
  score = (state === 'nextLevel') ? score : 0;
  lives = (state === 'nextLevel') ? lives : 3;
  timeLeft = lvl === 1 ? 60 : (lvl === 2 ? 90 : 100);
  invincible = 0;
  seeds = [];
  particles = [];

  scoreEl.textContent = '🎋 ' + score;
  livesEl.textContent = '❤️ ' + lives;
  timerEl.textContent = '⏱ ' + timeLeft;
  levelBadgeEl.textContent = 'NIVEL ' + lvl;

  level = lvl === 1 ? buildLevel1() : (lvl === 2 ? buildLevel2() : buildLevel3());
  player = { x: TILE, y: 7 * TILE, vx: 0, vy: 0, w: 28, h: 30,
             onGround: false, dir: 1, frame: 0, frameTimer: 0 };
  camera.x = 0;
}

// ─── Physics ───────────────────────────────────────────
function aabb(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}
function resolveY(p, plats) {
  p.onGround = false;
  for (const pl of plats) {
    if (p.x + p.w > pl.x && p.x < pl.x + pl.w) {
      if (p.vy >= 0 && p.y + p.h > pl.y && p.y + p.h < pl.y + pl.h + p.vy + 2) {
        p.y = pl.y - p.h; p.vy = 0; p.onGround = true;
      } else if (p.vy < 0 && p.y < pl.y + pl.h && p.y > pl.y) {
        p.y = pl.y + pl.h; p.vy = 0;
      }
    }
  }
}
function resolveX(p, plats) {
  for (const pl of plats) {
    if (pl.type !== 'ground') continue;
    if (p.y + p.h > pl.y && p.y < pl.y + pl.h) {
      if (p.x + p.w > pl.x && p.x < pl.x + pl.w) {
        if (p.vx > 0) p.x = pl.x - p.w;
        else if (p.vx < 0) p.x = pl.x + pl.w;
        p.vx = 0;
      }
    }
  }
}

// ─── Particles ─────────────────────────────────────────
function spawnParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: (Math.random() - 0.5) * 5 - 2,
      life: 25, color
    });
  }
}

// ─── Game loop ─────────────────────────────────────────
function gameLoop(ts) {
  animFrame = requestAnimationFrame(gameLoop);
  if (state !== 'playing') return;

  const left  = keys['ArrowLeft']  || keys['a'] || touch.left;
  const right = keys['ArrowRight'] || keys['d'] || touch.right;
  const jump  = keys['ArrowUp'] || keys['z'] || keys[' '] || keys['w'] || touch.jump;

  player.vx = 0;
  if (left)  { player.vx = -SPEED; player.dir = -1; }
  if (right) { player.vx =  SPEED; player.dir =  1; }
  if (jump && player.onGround) { player.vy = JUMP; player.onGround = false; }
  touch.jump = false;

  player.vy += GRAVITY;
  player.y += player.vy;
  resolveY(player, level.platforms);
  player.x += player.vx;
  player.x = Math.max(0, Math.min(player.x, (level.mapW - 1) * TILE));
  resolveX(player, level.platforms);

  // Fall off map
  if (player.y > H + 40) {
    lives--; livesEl.textContent = '❤️ ' + lives;
    if (lives <= 0) { endGame(false); return; }
    player.x = TILE; player.y = 7 * TILE; player.vy = 0; invincible = 120;
  }

  player.frameTimer++;
  if (player.frameTimer > 8) { player.frame = (player.frame + 1) % 2; player.frameTimer = 0; }

  const targetCam = player.x - W / 2 + player.w / 2;
  camera.x = Math.max(0, Math.min(targetCam, level.mapW * TILE - W));

  // Bamboo
  for (const b of level.bamboos) {
    if (!b.collected && aabb(player, b)) {
      b.collected = true; score++;
      scoreEl.textContent = '🎋 ' + score;
      spawnParticles(b.x + 8, b.y + 12, '#7CB342');
    }
  }

  // Enemies
  for (const e of level.enemies) {
    if (!e.alive) continue;

    if (e.type === 'walker') {
      e.x += e.dir * e.speed;
      if (e.x <= e.minX || e.x + e.w >= e.maxX) e.dir *= -1;

      if (invincible <= 0 && aabb(player, e)) {
        if (player.vy > 0 && player.y + player.h < e.y + e.h / 2 + 10) {
          e.alive = false; player.vy = -8; score += 2;
          scoreEl.textContent = '🎋 ' + score;
          spawnParticles(e.x + 12, e.y + 12, '#E53935');
        } else {
          loseLife(); if (lives <= 0) return;
        }
      }
    }

    if (e.type === 'aerial') {
      // Fly patrol
      e.x += e.dir * e.speed;
      if (e.x <= e.minX || e.x + e.w >= e.maxX) e.dir *= -1;

      // Wing animation
      e.wingTimer++;
      if (e.wingTimer > 5) { e.wingFrame = (e.wingFrame + 1) % 2; e.wingTimer = 0; }

      // Drop fireballs downward toward player (with slight horizontal aim)
      e.dropTimer++;
      if (e.dropTimer >= e.maxDrop) {
        e.dropTimer = 0;
        const dx = (player.x - e.x);
        const dist = Math.abs(dx);
        if (dist < 250) {
          const hVel = Math.sign(dx) * 1.5;
          seeds.push({ x: e.x + 18, y: e.y + e.h, vx: hVel, vy: 2.5, w: 12, h: 12, life: 200, type:'fireball' });
        }
      }

      // Stomp to kill aerial enemy
      if (invincible <= 0 && aabb(player, e)) {
        if (player.vy > 0 && player.y + player.h < e.y + e.h / 2 + 10) {
          e.alive = false; player.vy = -9; score += 5;
          scoreEl.textContent = '🎋 ' + score;
          spawnParticles(e.x + 18, e.y + 13, '#FF6F00');
        } else {
          loseLife(); if (lives <= 0) return;
        }
      }
    }

    if (e.type === 'shooter') {
      // Cooldown
      e.shootTimer++;
      if (e.shootTimer >= e.maxCooldown) {
        e.shootTimer = 0;
        // Only shoot if player is within horizontal range
        const dist = player.x - e.x;
        if (Math.abs(dist) < e.range) {
          const sd = dist < 0 ? -1 : 1;
          seeds.push({ x: e.x + 13, y: e.y + 14, vx: sd * 4.5, vy: 0, w: 10, h: 10, life: 80 });
        }
      }

      if (invincible <= 0 && aabb(player, e)) {
        if (player.vy > 0 && player.y + player.h < e.y + e.h / 2 + 10) {
          e.alive = false; player.vy = -8; score += 3;
          scoreEl.textContent = '🎋 ' + score;
          spawnParticles(e.x + 13, e.y + 14, '#558B2F');
        } else {
          loseLife(); if (lives <= 0) return;
        }
      }
    }
  }

  // Seeds & Fireballs
  for (let i = seeds.length - 1; i >= 0; i--) {
    const s = seeds[i];
    s.x += s.vx;
    if (s.type === 'fireball') {
      s.vy += 0.18; // gravity on fireballs
    } else {
      s.vy += 0.12; // slight arc on seeds
    }
    s.y += s.vy;
    s.life--;

    // Hit platform
    let hitWall = false;
    for (const pl of level.platforms) {
      if (aabb(s, pl)) { hitWall = true; break; }
    }
    if (hitWall || s.life <= 0 || s.x < 0 || s.x > level.mapW * TILE) {
      if (s.type === 'fireball') spawnParticles(s.x, s.y, '#FF6F00');
      seeds.splice(i, 1); continue;
    }

    if (invincible <= 0 && aabb(player, s)) {
      seeds.splice(i, 1);
      loseLife(); if (lives <= 0) return;
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (invincible > 0) invincible--;

  // Win condition
  if (level.bamboos.every(b => b.collected)) {
    if (currentLevel === 1) {
      showLevelComplete(1, goToLevel2);
    } else if (currentLevel === 2) {
      showLevelComplete(2, goToLevel3);
    } else {
      showLevelComplete(3, () => endGame(true));
    }
  }

  draw();
}

function loseLife() {
  lives--; livesEl.textContent = '❤️ ' + lives;
  invincible = 120;
  if (lives <= 0) { endGame(false); }
}

// ─── Hug Animation ─────────────────────────────────────
function showLevelComplete(lvl, nextCallback) {
  state = 'cutscene';
  clearInterval(timerInterval);

  const nextLvlInfo = [
    null,
    { title:'🌲 NIVEL 2: El Bosque Oscuro', desc:'¡Cuidado con las plantas que disparan semillas! 🌱' },
    { title:'🌩️ NIVEL 3: La Tormenta Final', desc:'¡Un dragón volador lanza bolas de fuego! 🔥<br>¡Es el nivel más difícil!' },
    null
  ];

  // Canvas animado de fondo
  const cs = document.createElement('canvas');
  cs.width = W; cs.height = H;
  cs.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:auto;z-index:10;';
  document.getElementById('gameArea').appendChild(cs);
  const cx = cs.getContext('2d');

  // Panel HTML con botón encima del canvas
  const isLast = !nextLvlInfo[lvl];
  const panel = document.createElement('div');
  panel.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;z-index:11;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:24px;pointer-events:none;';

    panel.innerHTML = '<div style="background:rgba(0,0,0,0.55);border-radius:12px;padding:14px 28px;text-align:center;pointer-events:auto;"><div style="color:#FFD54F;font-size:18px;font-weight:bold;font-family:Courier New,monospace;margin-bottom:8px;">🏆 ¡Completaste los 3 niveles!</div><div style="color:#fff;font-size:12px;font-family:Courier New,monospace;margin-bottom:12px;">Puntuación: ' + score + ' 🎋</div><button class="btn-play" id="cutsceneBtn">¡JUGAR DE NUEVO!</button></div>';
  } else {
    const info = nextLvlInfo[lvl];
    panel.innerHTML = '<div style="background:rgba(0,0,0,0.55);border-radius:12px;padding:14px 28px;text-align:center;pointer-events:auto;"><div style="color:#7dff7d;font-size:13px;font-family:Courier New,monospace;margin-bottom:4px;">⚠️ ' + info.title + '</div><div style="color:#ccc;font-size:11px;font-family:Courier New,monospace;margin-bottom:12px;">' + info.desc + '</div><button class="btn-play" id="cutsceneBtn">NIVEL ' + (lvl+1) + ' →</button></div>';
  }
  document.getElementById('gameArea').appendChild(panel);

  // Título arriba
  const titleEl = document.createElement('div');
  titleEl.style.cssText = 'position:absolute;top:12px;left:0;right:0;text-align:center;z-index:12;font-family:Courier New,monospace;font-size:22px;font-weight:bold;color:#ad1457;text-shadow:0 2px 6px rgba(255,255,255,0.8);pointer-events:none;';
  titleEl.textContent = '🎉 ¡Nivel ' + lvl + ' Completo!';
  document.getElementById('gameArea').appendChild(titleEl);

  let animId;
  function cleanup() {
    cancelAnimationFrame(animId);
    cs.remove(); panel.remove(); titleEl.remove();
  }

  panel.querySelector('#cutsceneBtn').addEventListener('click', () => {
    cleanup();
    if (isLast) { endGame(true); } else { nextCallback(); }
  });

  let frame = 0;

  const nextLvlInfo2 = nextLvlInfo; // alias to avoid redeclaration

  function drawCutscene() {
    animId = requestAnimationFrame(drawCutscene);
    cx.clearRect(0, 0, W, H);

    const globalT = Math.min(1, frame / 60); // entrada inicial ~1 seg

    // Background — warm gradient
    const bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#fce4ec');
    bg.addColorStop(1, '#f8bbd0');
    cx.fillStyle = bg;
    cx.fillRect(0, 0, W, H);

    // Estrellas parpadeantes
    for (let i = 0; i < 14; i++) {
      const sx = 30 + i * 46, sy = 18 + (i % 4) * 22;
      const twinkle = 0.5 + 0.5 * Math.sin(frame * 0.12 + i * 1.3);
      cx.globalAlpha = twinkle * 0.85;
      cx.fillStyle = '#FFD700';
      cx.beginPath(); cx.arc(sx, sy, 2 + twinkle * 1.5, 0, Math.PI*2); cx.fill();
    }
    cx.globalAlpha = 1;

    // Corazones flotando en loop continuo
    for (let h2 = 0; h2 < 10; h2++) {
      const seed = h2 * 37;
      const hx = 60 + (seed % (W - 120)) + Math.sin(frame * 0.04 + h2) * 12;
      const rawY = H - 60 - ((frame * 0.6 + h2 * 30) % (H - 40));
      cx.fillStyle = 'hsl(' + (330 + h2*12) + ',90%,62%)';
      cx.globalAlpha = 0.75;
      cx.font = '16px serif'; cx.textAlign = 'center';
      cx.fillText('❤', hx, rawY);
    }
    cx.globalAlpha = 1;

    // Suelo
    cx.fillStyle = '#a5d6a7';
    cx.fillRect(0, H - 60, W, 60);
    cx.fillStyle = '#66bb6a';
    cx.fillRect(0, H - 60, W, 8);

    // Flores oscilantes
    const flowerColors = ['#F48FB1','#FFE082','#CE93D8','#80DEEA'];
    for (let f = 0; f < 16; f++) {
      const fx = 30 + f * 38, fy = H - 55;
      const sway = Math.sin(frame * 0.05 + f * 0.8) * 2;
      cx.fillStyle = '#66BB6A';
      cx.fillRect(fx + sway, fy, 3, 12);
      cx.fillStyle = flowerColors[f%4];
      cx.beginPath(); cx.arc(fx + 1 + sway, fy, 5, 0, Math.PI*2); cx.fill();
    }

    // Slide-in al inicio, luego posición fija
    const slideIn = Math.min(1, globalT * 2);
    const eased = 1 - Math.pow(1 - slideIn, 3);
    const pandaX = -60 + eased * (W/2 - 70 + 60);
    const kittyX = W + 60 - eased * (W + 60 - (W/2 + 10));
    const charY = H - 125;

    // Rebote de abrazo continuo
    const hug = Math.sin(frame * 0.08) * 4;

    drawCutscenePanda(cx, pandaX, charY + hug, globalT);
    drawCutsceneKitty(cx, kittyX, charY - hug * 0.5, globalT);

    // Burbuja de diálogo con efecto latido
    if (globalT > 0.5) {
      const bubbleAlpha = Math.min(1, (globalT - 0.5) * 3);
      cx.globalAlpha = bubbleAlpha;
      const bx = W/2 - 10, by = charY - 82;
      cx.fillStyle = '#fff';
      cx.strokeStyle = '#e91e63';
      cx.lineWidth = 2;
      cx.beginPath(); cx.roundRect(bx - 130, by - 30, 260, 50, 12); cx.fill(); cx.stroke();
      cx.fillStyle = '#fff'; cx.strokeStyle = '#e91e63';
      cx.beginPath();
      cx.moveTo(bx + 20, by + 20); cx.lineTo(bx + 35, by + 40); cx.lineTo(bx + 5, by + 20);
      cx.closePath(); cx.fill(); cx.stroke();
      const pulse = 1 + Math.sin(frame * 0.1) * 0.03;
      cx.fillStyle = '#c2185b';
      cx.font = 'bold ' + Math.round(12 * pulse) + 'px Courier New';
      cx.textAlign = 'center';
      cx.fillText('¡Sigue así, lo estás', bx, by - 5);
      cx.fillText('haciendo increíble! 🌟', bx, by + 15);
      cx.globalAlpha = 1;
    }

    frame++;
  }
  drawCutscene();
}

function drawCutscenePanda(cx, x, y, t) {
  cx.save(); cx.translate(x, y);
  // Body
  cx.fillStyle = '#FFF'; cx.strokeStyle = '#222'; cx.lineWidth = 1;
  cx.beginPath(); cx.ellipse(18, 26, 17, 20, 0, 0, Math.PI*2); cx.fill(); cx.stroke();
  // Head
  cx.beginPath(); cx.arc(18, 10, 13, 0, Math.PI*2); cx.fill(); cx.stroke();
  // Ears
  cx.fillStyle = '#222';
  cx.beginPath(); cx.arc(7, 0, 5, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(29, 0, 5, 0, Math.PI*2); cx.fill();
  // Eye patches
  cx.beginPath(); cx.ellipse(12, 9, 4.5, 4, 0, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(24, 9, 4.5, 4, 0, 0, Math.PI*2); cx.fill();
  cx.fillStyle = '#FFF';
  cx.beginPath(); cx.arc(12, 9, 2, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(24, 9, 2, 0, Math.PI*2); cx.fill();
  // Nose
  cx.fillStyle = '#222';
  cx.beginPath(); cx.arc(18, 13, 2, 0, Math.PI*2); cx.fill();
  // Smile
  cx.strokeStyle = '#222'; cx.lineWidth = 1.5;
  cx.beginPath(); cx.arc(18, 14, 5, 0.2, Math.PI - 0.2); cx.stroke();
  // Hug arm (raised toward kitty)
  cx.fillStyle = '#222';
  cx.beginPath(); cx.ellipse(34, 20, 4, 9, 0.6, 0, Math.PI*2); cx.fill();
  cx.restore();
}

function drawCutsceneKitty(cx, x, y, t) {
  cx.save(); cx.translate(x, y);
  cx.scale(-1, 1); cx.translate(-40, 0);

  // Body
  cx.fillStyle = '#FFF9C4'; cx.strokeStyle = '#333'; cx.lineWidth = 1;
  cx.beginPath(); cx.ellipse(20, 28, 16, 18, 0, 0, Math.PI*2); cx.fill(); cx.stroke();
  // Head
  cx.beginPath(); cx.arc(20, 11, 13, 0, Math.PI*2); cx.fill(); cx.stroke();
  // Ears — triangles
  cx.fillStyle = '#FFF9C4';
  cx.beginPath(); cx.moveTo(8, 2); cx.lineTo(3, -12); cx.lineTo(15, -4); cx.closePath(); cx.fill(); cx.stroke();
  cx.beginPath(); cx.moveTo(32, 2); cx.lineTo(37, -12); cx.lineTo(25, -4); cx.closePath(); cx.fill(); cx.stroke();
  // Inner ear
  cx.fillStyle = '#F48FB1';
  cx.beginPath(); cx.moveTo(9, 0); cx.lineTo(5, -9); cx.lineTo(14, -3); cx.closePath(); cx.fill();
  cx.beginPath(); cx.moveTo(31, 0); cx.lineTo(35, -9); cx.lineTo(26, -3); cx.closePath(); cx.fill();
  // Eyes — big happy
  cx.fillStyle = '#333';
  // Closed happy eyes (^_^)
  cx.strokeStyle = '#333'; cx.lineWidth = 2.5;
  cx.beginPath(); cx.arc(14, 10, 4, Math.PI, 0); cx.stroke();
  cx.beginPath(); cx.arc(26, 10, 4, Math.PI, 0); cx.stroke();
  // Nose
  cx.fillStyle = '#F48FB1';
  cx.beginPath(); cx.arc(20, 14, 2.5, 0, Math.PI*2); cx.fill();
  // Whiskers
  cx.strokeStyle = '#999'; cx.lineWidth = 1;
  for (let w = 0; w < 3; w++) {
    cx.beginPath(); cx.moveTo(20, 14); cx.lineTo(20 + 20 + w*3, 11 + w*3); cx.stroke();
    cx.beginPath(); cx.moveTo(20, 14); cx.lineTo(0 - w*3, 11 + w*3); cx.stroke();
  }
  // Hug arm (toward panda)
  cx.fillStyle = '#FFF9C4'; cx.strokeStyle = '#333'; cx.lineWidth = 1;
  cx.beginPath(); cx.ellipse(6, 20, 4, 9, -0.6, 0, Math.PI*2); cx.fill(); cx.stroke();
  // Tail
  cx.strokeStyle = '#FFF9C4'; cx.lineWidth = 5;
  cx.beginPath();
  cx.moveTo(20, 44);
  const tailBob = Math.sin(t * Math.PI * 8) * 12;
  cx.quadraticCurveTo(40, 50 + tailBob, 50, 35 + tailBob);
  cx.stroke();
  cx.restore();
}

function drawEnemy(e) {
  if (!e.alive) return;
  if (e.type === 'walker') {
    ctx.save(); ctx.translate(e.x, e.y);
    ctx.fillStyle = '#E53935';
    ctx.beginPath(); ctx.ellipse(12, 16, 11, 12, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#EF5350';
    ctx.beginPath(); ctx.arc(12, 7, 8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(9, 6, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(15, 6, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(9, 6, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(15, 6, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#B71C1C';
    ctx.beginPath(); ctx.ellipse(7, 27, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(17, 27, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  } else if (e.type === 'shooter') {
    // Piranha Plant / evil plant villain
    ctx.save(); ctx.translate(e.x, e.y);

    // Stem
    ctx.fillStyle = '#388E3C';
    ctx.fillRect(9, 18, 8, 12);

    // Pot / base
    ctx.fillStyle = '#6D4C41';
    ctx.beginPath(); ctx.roundRect(3, 20, 20, 10, 3); ctx.fill();
    ctx.fillStyle = '#8D6E63';
    ctx.fillRect(3, 20, 20, 4);

    // Head — animated open/close with shootTimer
    const open = e.shootTimer > e.maxCooldown - 20;
    ctx.fillStyle = '#2E7D32';
    ctx.beginPath(); ctx.ellipse(13, 10, 12, open ? 12 : 9, 0, 0, Math.PI * 2); ctx.fill();

    // Petals
    ctx.fillStyle = '#1B5E20';
    for (let a = 0; a < 6; a++) {
      const ang = (a / 6) * Math.PI * 2;
      ctx.beginPath();
      ctx.ellipse(13 + Math.cos(ang) * 11, 10 + Math.sin(ang) * 10, 5, 3, ang, 0, Math.PI * 2);
      ctx.fill();
    }

    // Face
    ctx.fillStyle = '#C62828';
    ctx.beginPath(); ctx.ellipse(13, open ? 12 : 10, 7, open ? 6 : 4, 0, 0, Math.PI * 2); ctx.fill();

    // Eyes
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(9, 7, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(17, 7, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(9.5, 7, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(17.5, 7, 1.5, 0, Math.PI * 2); ctx.fill();

    // Teeth (when open)
    if (open) {
      ctx.fillStyle = '#FFF';
      ctx.fillRect(8, 11, 3, 5);
      ctx.fillRect(14, 11, 3, 5);
    }

    ctx.restore();
  }
}

function drawAerialEnemy(e) {

  ctx.quadraticCurveTo(5, 18, 10, 12);
  ctx.fill();
  // Right wing
  ctx.beginPath();
  ctx.moveTo(26, 12);
  ctx.quadraticCurveTo(46, wingUp ? -8 : 2, 38, wingUp ? 20 : 22);
  ctx.quadraticCurveTo(31, 18, 26, 12);

  // Body
  ctx.fillStyle = '#D84315';
  ctx.beginPath(); ctx.ellipse(18, 14, 16, 11, 0, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#BF360C';
  ctx.beginPath(); ctx.arc(30, 10, 9, 0, Math.PI*2); ctx.fill();
  // Snout
  ctx.fillStyle = '#E64A19';
  ctx.beginPath(); ctx.ellipse(37, 12, 6, 4, 0.3, 0, Math.PI*2); ctx.fill();
  // Nostril smoke
  ctx.fillStyle = 'rgba(255,200,100,0.8)';
  ctx.beginPath(); ctx.arc(40, 9, 3, 0, Math.PI*2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(28, 7, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(29, 7, 1.8, 0, Math.PI*2); ctx.fill();
  // Spines on back
  ctx.fillStyle = '#FF8F00';
  for (let s2 = 0; s2 < 4; s2++) {
    ctx.beginPath();
    ctx.moveTo(4 + s2 * 6, 5);
    ctx.lineTo(4 + s2 * 6 + 3, -4);
    ctx.lineTo(4 + s2 * 6 + 6, 5);
    ctx.closePath(); ctx.fill();
  }
  // Tail
  ctx.strokeStyle = '#D84315'; ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(3, 14);
  ctx.quadraticCurveTo(-8, 22, -4, 28);
  ctx.stroke();
  // Tail tip spike
  ctx.fillStyle = '#FF6F00';
  ctx.beginPath(); ctx.moveTo(-4, 28); ctx.lineTo(-10, 32); ctx.lineTo(0, 30); ctx.closePath(); ctx.fill();

  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(-camera.x, 0);

  // Sky — darker in level 2
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  if (currentLevel === 1) {
    skyGrad.addColorStop(0, '#87CEEB'); skyGrad.addColorStop(1, '#C8E6FA');
  } else if (currentLevel === 2) {
    skyGrad.addColorStop(0, '#1a2a3a'); skyGrad.addColorStop(1, '#2d4a5a');
  } else {
    skyGrad.addColorStop(0, '#1a0a00'); skyGrad.addColorStop(1, '#3d1000');
  }
  ctx.fillStyle = skyGrad;
  ctx.fillRect(camera.x, 0, W, H);

  const clouds3 = [
    {bx:20,y:45},{bx:160,y:25},{bx:320,y:50},{bx:480,y:35},{bx:640,y:55},{bx:800,y:30},{bx:960,y:45},{bx:1200,y:40}
  ];
  const cls = currentLevel === 1 ? clouds1 : (currentLevel === 2 ? clouds2 : clouds3);
  if (currentLevel === 1) {
    cls.forEach(c => drawCloud(c.bx, c.y));
  } else if (currentLevel === 2) {
    // Dark clouds
    cls.forEach(c => {
      ctx.fillStyle = 'rgba(60,80,100,0.7)';
      ctx.beginPath(); ctx.arc(c.bx, c.y, 18, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(c.bx+20, c.y-5, 14, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(c.bx+38, c.y, 16, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(c.bx-8, c.y, 54, 20);
    });
  } else {
    // Fire storm clouds — orange/red
    cls.forEach(c => {
      ctx.fillStyle = 'rgba(120,40,0,0.8)';
      ctx.beginPath(); ctx.arc(c.bx, c.y, 20, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(c.bx+22, c.y-5, 15, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(c.bx+42, c.y, 17, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(c.bx-8, c.y, 58, 20);
      // Lightning flicker
      if (Math.random() < 0.01) {
        ctx.strokeStyle = 'rgba(255,220,50,0.9)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(c.bx+20, c.y+20);
        ctx.lineTo(c.bx+14, c.y+38); ctx.lineTo(c.bx+20, c.y+38);
        ctx.lineTo(c.bx+12, c.y+55); ctx.stroke();
      }
    });
  }

  // Mountains
  ctx.fillStyle = currentLevel === 1 ? '#B0BEC5' : (currentLevel === 2 ? '#263238' : '#4a1500');
  for (let i = 0; i < 8; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 180 - 50, H - 80);
    ctx.lineTo(i * 180 + 90, H - 200);
    ctx.lineTo(i * 180 + 220, H - 80);
    ctx.fill();
  }

  // Ground
  ctx.fillStyle = currentLevel === 1 ? '#5C4033' : (currentLevel === 2 ? '#3E2723' : '#2d0a00');
  ctx.fillRect(0, 9 * TILE + 4, level.mapW * TILE, H);

  for (const pl of level.platforms) {
    if (pl.type === 'ground') {
      ctx.fillStyle = currentLevel === 1 ? '#5C4033' : (currentLevel === 2 ? '#3E2723' : '#2d0a00');
      ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
      ctx.fillStyle = currentLevel === 1 ? '#4CAF50' : (currentLevel === 2 ? '#1B5E20' : '#7B1F00');
      ctx.fillRect(pl.x, pl.y, pl.w, 6);
      ctx.fillStyle = currentLevel === 1 ? '#388E3C' : (currentLevel === 2 ? '#1a4a1a' : '#5C1200');
      ctx.fillRect(pl.x, pl.y + 6, pl.w, 2);
    } else {
      ctx.fillStyle = '#6D4C41'; ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
      ctx.fillStyle = currentLevel === 1 ? '#A5D6A7' : (currentLevel === 2 ? '#4CAF50' : '#BF360C');
      ctx.fillRect(pl.x, pl.y, pl.w, 5);
      ctx.fillStyle = currentLevel === 1 ? '#81C784' : (currentLevel === 2 ? '#388E3C' : '#8D2400');
      ctx.fillRect(pl.x + 2, pl.y + 5, pl.w - 4, 2);
      ctx.strokeStyle = '#6D4C41'; ctx.lineWidth = 1;
      ctx.strokeRect(pl.x + .5, pl.y + .5, pl.w - 1, pl.h - 1);
    }
  }

  for (const b of level.bamboos) {
    if (!b.collected) drawBamboo(b.x, b.y);
  }

  for (const e of level.enemies) {
    if (e.type === 'aerial') drawAerialEnemy(e);
    else drawEnemy(e);
  }
  for (const s of seeds) {
    if (s.type === 'fireball') drawFireball(s);
    else drawSeed(s);
  }

  // Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life / 25;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  const alpha = invincible > 0 ? (Math.floor(invincible / 6) % 2 === 0 ? 0.4 : 1) : 1;
  drawPanda(player.x, player.y - 2, player.dir, player.frame, alpha);

  ctx.restore();

  // HUD overlay
  const total = level.bamboos.length;
  const collected = level.bamboos.filter(b => b.collected).length;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(W - 120, 6, 112, 24);
  ctx.fillStyle = '#7dff7d';
  ctx.font = 'bold 12px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText(collected + '/' + total + ' 🎋', W - 10, 23);
  ctx.textAlign = 'left';

  // Level warning banner
  if (currentLevel === 2) {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(8, 6, 130, 18);
    ctx.fillStyle = '#FFD54F';
    ctx.font = 'bold 11px Courier New';
    ctx.fillText('🌱 ¡Esquiva semillas!', 12, 19);
  } else if (currentLevel === 3) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(8, 6, 155, 18);
    ctx.fillStyle = '#FF6F00';
    ctx.font = 'bold 11px Courier New';
    ctx.fillText('🔥 ¡Esquiva bolas de fuego!', 12, 19);
  }
}

// ─── Game state ────────────────────────────────────────
function endGame(win) {
  state = 'over';
  clearInterval(timerInterval);
  overlay.style.display = 'flex';
  if (win) {
    overlay.innerHTML = `<h2>🏆 ¡GANASTE!</h2>
      <p>¡Completaste los 3 niveles!<br>Puntuación final: ${score} 🎋<br><br>
      ¡El panda y el gatito están muy orgullosos de ti! 🐼🐱</p>
      <button class="btn-play" id="startBtn">JUGAR DE NUEVO</button>`;
    document.getElementById('startBtn').addEventListener('click', () => startGame(false));
  } else {
    const checkpointMsg = checkpoint > 1
      ? `<br><span style="color:#FFD54F;font-size:12px;">🔖 Checkpoint activo: Nivel ${checkpoint}</span>`
      : '';
    overlay.innerHTML = `<h2>💀 Game Over</h2>
      <p>Nivel ${currentLevel} — Puntuación: ${score}${checkpointMsg}</p>
      <button class="btn-play" id="startBtn">REINTENTAR NIVEL ${checkpoint}</button>`;
    document.getElementById('startBtn').addEventListener('click', () => startGame(true));
  }
}

function startGame(fromCheckpoint = false) {
  overlay.style.display = 'none';
  state = 'playing';
  if (!fromCheckpoint) checkpoint = 1; // nuevo juego desde el menú: resetear
  initGame(checkpoint);
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    timerEl.textContent = '⏱ ' + timeLeft;
    if (timeLeft <= 0) endGame(false);
  }, 1000);
  if (isMobile()) controlsDiv.classList.add('visible');
}

// ─── Keyboard ──────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ─── Touch controls ────────────────────────────────────
function setupTouchBtn(id, prop) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('touchstart', e => { e.preventDefault(); touch[prop] = true;  btn.classList.add('pressed'); },    { passive: false });
  btn.addEventListener('touchend',   e => { e.preventDefault(); touch[prop] = false; btn.classList.remove('pressed'); }, { passive: false });
  btn.addEventListener('mousedown',  () => { touch[prop] = true;  btn.classList.add('pressed'); });
  btn.addEventListener('mouseup',    () => { touch[prop] = false; btn.classList.remove('pressed'); });
}
setupTouchBtn('btnLeft',  'left');
setupTouchBtn('btnRight', 'right');

const jumpBtn = document.getElementById('btnJump');
if (jumpBtn) {
  jumpBtn.addEventListener('touchstart', e => { e.preventDefault(); touch.jump = true; jumpBtn.classList.add('pressed'); }, { passive: false });
  jumpBtn.addEventListener('touchend',   e => { e.preventDefault(); jumpBtn.classList.remove('pressed'); }, { passive: false });
  jumpBtn.addEventListener('mousedown',  () => { touch.jump = true; jumpBtn.classList.add('pressed'); });
  jumpBtn.addEventListener('mouseup',    () => { jumpBtn.classList.remove('pressed'); });
}

// ─── Start ─────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', () => startGame(false));
animFrame = requestAnimationFrame(gameLoop);
</script>
